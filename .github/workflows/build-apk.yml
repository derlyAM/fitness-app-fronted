name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.1'
      - run: cd fitness_app && flutter pub get
      - run: cd fitness_app && flutter build apk --debug
      - uses: actions/upload-artifact@v3
        with:
          name: app-debug
          path: fitness_app/build/app/outputs/flutter-apk/app-debug.apk
